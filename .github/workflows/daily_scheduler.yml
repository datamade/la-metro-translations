name: Daily document ETL dispatcher

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC

jobs:
  staging:
    uses: ./.github/workflows/run_document_etl.yml
    with:
      environment: staging
    secrets: inherit

