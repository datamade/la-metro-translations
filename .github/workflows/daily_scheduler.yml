name: Daily translation dispatcher

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC

jobs:
  staging:
    uses: ./.github/workflows/run_translation.yml
    with:
      environment: staging

  production:
    uses: ./.github/workflows/run_translation.yml
    with:
      environment: production
